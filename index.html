<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Зарплата НПП ОЗТ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f1117;color:#e2e8f0;font-size:13px}
:root{
  --bg1:#0f1117;--bg2:#161b27;--bg3:#1e2535;--bg4:#252d3d;
  --border:#2d3748;--border2:#3d4f6b;
  --green:#4ade80;--red:#f87171;--amber:#fbbf24;--blue:#60a5fa;
  --purple:#a78bfa;--teal:#2dd4bf;--text2:#94a3b8;--text3:#64748b;
  --mono:'Courier New',monospace
}
.app{display:grid;grid-template-columns:220px 1fr;height:100vh;overflow:hidden}
/* Сайдбар */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:12px}
.sidebar h3{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin:12px 0 6px}
.field{margin-bottom:6px}
.field label{display:block;font-size:10px;color:var(--text3);margin-bottom:2px}
.field input,.field select{width:100%;background:var(--bg3);border:1px solid var(--border);color:#e2e8f0;padding:5px 8px;border-radius:5px;font-size:12px}
.btn{background:var(--bg4);border:1px solid var(--border2);color:#e2e8f0;padding:6px 12px;border-radius:5px;cursor:pointer;font-size:12px;width:100%;margin-bottom:4px}
.btn:hover{background:var(--bg3)}
.btn.green{background:rgba(74,222,128,.15);border-color:var(--green);color:var(--green)}
.btn.blue{background:rgba(96,165,250,.15);border-color:var(--blue);color:var(--blue)}
.emp-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px;margin-bottom:6px}
.emp-name{font-weight:600;font-size:12px}
.emp-pos{font-size:10px;color:var(--text3)}
.emp-btns{display:flex;gap:4px;margin-top:6px}
.emp-btns button{flex:1;padding:3px;font-size:10px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:var(--bg4);color:#e2e8f0}
/* Основная область */
.main{display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px}
.tab{padding:10px 16px;cursor:pointer;font-size:12px;color:var(--text3);border-bottom:2px solid transparent}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
.content{flex:1;overflow-y:auto;padding:16px}
/* Список дней */
.days-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;margin-bottom:16px}
.day-btn{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px;cursor:pointer;text-align:center;font-size:11px}
.day-btn.active{border-color:var(--green);color:var(--green);background:rgba(74,222,128,.08)}
.day-btn.weekend{border-color:rgba(248,113,113,.3);color:var(--red);background:rgba(248,113,113,.05)}
.day-btn.weekend.active{border-color:var(--red)}
.day-btn.has-data::after{content:'•';color:var(--green);display:block;font-size:16px;line-height:1}
/* Карточки */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:12px}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)}
.card-title{font-weight:600;font-size:13px}
.card-body{padding:12px 14px}
/* Таблицы */
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:6px 8px;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);border-bottom:1px solid var(--border)}
td{padding:6px 8px;border-bottom:1px solid var(--border);font-size:12px}
tr:last-child td{border-bottom:none}
td.r,th.r{text-align:right}
td.num{font-family:var(--mono);font-size:12px}
/* Инпуты в таблице */
.ci{background:var(--bg3);border:1px solid var(--border);color:#e2e8f0;padding:3px 6px;border-radius:4px;font-size:12px;font-family:var(--mono)}
select.ci{font-family:system-ui,sans-serif}
/* Статус */
.status{padding:4px 10px;font-size:11px;border-radius:4px;display:inline-block}
.status.ok{background:rgba(74,222,128,.15);color:var(--green)}
.status.err{background:rgba(248,113,113,.15);color:var(--red)}
.status.loading{background:rgba(96,165,250,.15);color:var(--blue)}
/* KPI */
.kpi{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:12px}
.kcard{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:10px 12px}
.kcard .lbl{font-size:10px;color:var(--text3);margin-bottom:4px}
.kcard .val{font-size:18px;font-weight:700;font-family:var(--mono)}
.g{color:var(--green)}.r{color:var(--red)}.a{color:var(--amber)}.b{color:var(--blue)}
/* Модал */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:20px;width:500px;max-height:80vh;overflow-y:auto}
.modal h3{margin-bottom:14px;font-size:15px}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.mrow.full{grid-template-columns:1fr}
.mfield label{display:block;font-size:10px;color:var(--text3);margin-bottom:3px}
.mfield input,.mfield select{width:100%;background:var(--bg3);border:1px solid var(--border);color:#e2e8f0;padding:6px 8px;border-radius:5px;font-size:12px}
.modal-btns{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
.modal-btns button{padding:7px 18px;border-radius:5px;cursor:pointer;font-size:12px;border:1px solid var(--border2);background:var(--bg3);color:#e2e8f0}
.modal-btns .save{background:rgba(74,222,128,.2);border-color:var(--green);color:var(--green)}
.del-btn{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red);padding:3px 8px;border-radius:4px;cursor:pointer;font-size:11px}
.add-btn{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:var(--green);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px}
.sec-hdr{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);padding:4px 0;border-bottom:1px solid var(--border);margin:8px 0 6px}
.badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px}
.badge.off{background:rgba(96,165,250,.15);color:var(--blue)}
</style>
</head>
<body>
<div style="background:#1a1a2e;color:#4ade80;text-align:center;padding:3px;font-size:10px;font-family:monospace">
  ВЕРСИЯ 2.0 — если видите это, правильный файл загружен
</div>
<div class="app">
  <!-- САЙДБАР -->
  <div class="sidebar">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <b style="font-size:14px">НПП ОЗТ</b>
      <span id="sync-status" class="status loading">загрузка</span>
    </div>

    <div class="field">
      <label>Месяц</label>
      <input type="month" id="sel-month">
    </div>
    <div style="display:flex;gap:4px;margin-bottom:8px">
      <button class="btn" id="btn-p1" onclick="setPeriod(1)" style="flex:1">П1 (1-15)</button>
      <button class="btn" id="btn-p2" onclick="setPeriod(2)" style="flex:1">П2 (16-кон)</button>
    </div>

    <h3>Параметры налогов</h3>
    <div class="field"><label>НДФЛ %</label><input class="ci" id="tax-ndfl" value="13" style="width:80px"></div>
    <div class="field"><label>Взносы до порога %</label><input class="ci" id="tax-ins1" value="30.2" style="width:80px"></div>
    <div class="field"><label>Взносы сверх %</label><input class="ci" id="tax-ins2" value="7.6" style="width:80px"></div>
    <div class="field"><label>Порог МСП ₽</label><input class="ci" id="tax-thresh" value="40639.5" style="width:100px"></div>

    <h3>Тарифы бригады ₽/м²</h3>
    <div id="brigade-rates"></div>

    <h3>Сотрудники</h3>
    <button class="btn green" onclick="openEmpModal()">+ Добавить сотрудника</button>
    <div id="emp-list"></div>

    <div style="margin-top:12px">
      <button class="btn" onclick="console.log('btn click');syncNow()">☁ Синхронизировать</button>
    </div>
  </div>

  <!-- ОСНОВНАЯ ОБЛАСТЬ -->
  <div class="main">
    <div class="tabs">
      <div class="tab active" onclick="showTab('day')" id="tab-day">📅 День</div>
      <div class="tab" onclick="showTab('period')" id="tab-period">📊 Итог периода</div>
    </div>
    <div class="content" id="content">
      <div style="color:var(--text3);text-align:center;margin-top:40px">Выберите месяц и день</div>
    </div>
  </div>
</div>

<!-- МОДАЛ СОТРУДНИКА -->
<div class="modal-bg" id="emp-modal">
  <div class="modal">
    <h3 id="emp-modal-title">Сотрудник</h3>
    <div class="mrow full"><div class="mfield"><label>ФИО</label><input id="e-name" placeholder="Иванов Иван Иванович"></div></div>
    <div class="mrow">
      <div class="mfield"><label>Должность</label><input id="e-pos" placeholder="Прошивщик"></div>
      <div class="mfield"><label>Тип</label>
        <select id="e-type" onchange="toggleEmpType()">
          <option value="prod">Производственный</option>
          <option value="office">Офисный (оклад)</option>
        </select>
      </div>
    </div>
    <div id="e-salary-block" style="display:none">
      <div class="mrow"><div class="mfield"><label>Оклад ₽/мес</label><input id="e-salary" value="0"></div></div>
    </div>
    <div id="e-rates-block">
      <div class="sec-hdr">Тарифы прошива ₽/м²</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px" id="e-rates-grid"></div>
    </div>
    <div class="modal-btns">
      <button onclick="closeEmpModal()">Отмена</button>
      <button class="save" onclick="saveEmp()">Сохранить</button>
    </div>
  </div>
</div>

<script>
'use strict';

const GS_URL = 'https://script.google.com/macros/s/AKfycbzC0vd34pjqKioZyiy_f7P9zTbrmmlZO6Xacw1XZSVvv1vSfsq2dJwi4vK1bhrzRZUwkQ/exec';

// ── КОНСТАНТЫ ──
const SEW_OPS = {
  sew5f:'5П', sew5nf:'5НФ', sew8f:'8П', sew8nf:'8НФ',
  sew10f:'10П', sew10nf:'10НФ', sew13f:'13П', sew13nf:'13НФ',
  sew16f:'16П', sew16nf:'16НФ'
};
const FOL_OPS = {
  fol_5f:'5Ф', fol_5tf:'5ТФ', fol_8f:'8Ф', fol_8tf:'8ТФ',
  fol_10f:'10Ф', fol_10tf:'10ТФ', fol_13f:'13Ф', fol_13tf:'13ТФ',
  fol_16f:'16Ф', fol_16tf:'16ТФ', glue:'Клей FP'
};
const ALL_OPS = {...SEW_OPS, ...FOL_OPS};

// ── СОСТОЯНИЕ ──
let DB = {
  employees: [],   // [{id,name,pos,type,salary,rates:{sew5f:3.5,...}}]
  days: {},        // {'2026-04-01': {indiv:[{empId,op,qty,rate,gross}], brigade:{ops:[{op,qty,rate,gross}],members:[empId]}, after:[{empId,op,qty,rate,gross,isBrigade,members}], absences:{empId:'vacation'}}}
  premiums: {},    // {'2026-041_empId': {premium,cash}}
  brigRates: {}    // {fol_5f: 2.5, ...}
};
let curPeriod = 1;
let curDay = '';
let curTab = 'day';
let isReady = false; // не сохраняем пока не загружены данные

// ── УТИЛИТЫ ──
const uid = () => Math.random().toString(36).slice(2,9);
const fmt = n => (+(n||0)).toLocaleString('ru',{minimumFractionDigits:2,maximumFractionDigits:2});
const today = () => new Date().toISOString().split('T')[0];
const getMonth = () => document.getElementById('sel-month').value || new Date().toISOString().slice(0,7);

function getPeriodDays(month, period) {
  if (!month) return [];
  const [y,m] = month.split('-').map(Number);
  const start = period === 1 ? 1 : 16;
  const end = period === 1 ? 15 : new Date(y,m,0).getDate();
  const days = [];
  for (let d = start; d <= end; d++) {
    days.push(`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  }
  return days;
}

function isWeekend(date) {
  const d = new Date(date).getDay();
  return d === 0 || d === 6;
}

const DAYS_RU = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];

function dayLabel(date) {
  const dt = new Date(date);
  return `${String(dt.getDate()).padStart(2,'0')} ${DAYS_RU[dt.getDay()]}`;
}

function getDay(date) {
  if (!DB.days[date]) DB.days[date] = {indiv:[], brigade:{ops:[],members:[]}, after:[], absences:{}};
  const d = DB.days[date];
  if (!d.brigade) d.brigade = {ops:[],members:[]};
  if (!d.after) d.after = [];
  if (!d.absences) d.absences = {};
  return d;
}

function calcDayTotals(date) {
  const d = DB.days[date];
  if (!d) return {};
  const totals = {};
  (d.indiv||[]).forEach(r => { totals[r.empId] = (totals[r.empId]||0) + (r.gross||0); });
  const bOps = d.brigade?.ops||[];
  const bMem = d.brigade?.members||[];
  const bTotal = bOps.reduce((s,b)=>s+(b.gross||0),0);
  const bPer = bMem.length > 0 ? bTotal/bMem.length : 0;
  bMem.forEach(id => { totals[id] = (totals[id]||0) + bPer; });
  (d.after||[]).forEach(r => {
    if (r.isBrigade) {
      const per = (r.members||[]).length > 0 ? (r.gross||0)/(r.members||[]).length : 0;
      (r.members||[]).forEach(id => { totals[id] = (totals[id]||0) + per; });
    } else {
      totals[r.empId] = (totals[r.empId]||0) + (r.gross||0);
    }
  });
  return totals;
}

// ── GOOGLE SHEETS ──
async function gsLoad(table) {
  const r = await fetch(`${GS_URL}?action=load&table=${table}`);
  const j = await r.json();
  if (!j.ok) throw new Error(j.error);
  const rows = j.rows||[];
  if (rows.length < 2) return [];
  const keys = rows[0];
  return rows.slice(1).map(row => {
    const obj = {};
    keys.forEach((k,i) => { try { obj[k] = JSON.parse(row[i]); } catch { obj[k] = row[i]; } });
    return obj;
  });
}

async function gsSave(table, rows) {
  if (!rows || rows.length === 0) {
    const r = await fetch(GS_URL + '?action=clear&table=' + encodeURIComponent(table));
    return;
  }
  const keys = Object.keys(rows[0]);
  // Каждую строку — отдельным запросом (избегаем лимит URL)
  for (let i = 0; i < rows.length; i++) {
    const isFirst = i === 0;
    const rowVals = keys.map(k => {
      const v = rows[i][k];
      return v === undefined || v === null ? '' : JSON.stringify(v);
    });
    const batch = isFirst ? [keys, rowVals] : [rowVals];
    const params = new URLSearchParams({
      action: 'save', table,
      rows: JSON.stringify(batch),
      clear: isFirst ? '1' : '0'
    });
    const res = await fetch(GS_URL + '?' + params.toString());
    if (!res.ok) throw new Error('HTTP ' + res.status + ' on ' + table + '[' + i + ']');
    const j = await res.json();
    if (!j.ok) throw new Error((j.error||'GS err') + ' on ' + table + '[' + i + ']');
  }
}


async function loadAll() {
  setStatus('loading','загрузка...');
  try {
    // Сотрудники
    const emps = await gsLoad('sal_employees');
    if (emps.length) DB.employees = emps;

    // Дни зарплаты
    const days = await gsLoad('sal_days');
    days.forEach(r => {
      try { DB.days[r.date] = JSON.parse(r.data); } catch {}
    });

    // Премии/наличка
    const prems = await gsLoad('sal_premiums');
    if (prems.length && prems[0].data) {
      try { DB.premiums = JSON.parse(prems[0].data); } catch {}
    }

    // Настройки (тарифы бригады)
    const sets = await gsLoad('sal_settings');
    if (sets.length && sets[0].data) {
      try { DB.brigRates = JSON.parse(sets[0].data); } catch {}
    }

    isReady = true;
    setStatus('ok','синхронизировано');
    renderSidebar();
    renderContent();
  } catch(e) {
    isReady = true;
    setStatus('err','офлайн');
    console.error('loadAll error:', e);
  }
}

let syncTimer = null;
function scheduleSave() {
  if (!isReady) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(syncNow, 1500);
}

async function syncNow() {
  if (!isReady) { console.log('syncNow: not ready, skip'); return; }
  console.log('syncNow: start, days=', Object.keys(DB.days).length);
  setStatus('loading','сохранение...');
  try {
    console.log('saving employees:', DB.employees.length);
    await gsSave('sal_employees', DB.employees);
    
    const dayRows = Object.entries(DB.days)
      .filter(([,d]) => (d.indiv||[]).length || (d.brigade?.ops||[]).length || (d.after||[]).length || Object.keys(d.absences||{}).length)
      .map(([date,d]) => ({date, data: JSON.stringify(d)}));
    console.log('saving days:', dayRows.length, 'non-empty days');
    if (dayRows.length > 0) console.log('first day:', dayRows[0].date, 'dataLen:', dayRows[0].data.length);
    await gsSave('sal_days', dayRows);
    console.log('days saved OK');

    await gsSave('sal_premiums', [{data: JSON.stringify(DB.premiums)}]);
    await gsSave('sal_settings', [{data: JSON.stringify(DB.brigRates)}]);

    setStatus('ok','сохранено ✓');
    console.log('syncNow: all done');
    setTimeout(() => setStatus('ok','синхронизировано'), 2000);
  } catch(e) {
    setStatus('err','ошибка: ' + e.message);
    console.error('syncNow FAILED:', e.message, e.stack);
  }
}

function setStatus(type, text) {
  const el = document.getElementById('sync-status');
  el.className = `status ${type}`;
  el.textContent = text;
}

// ── РЕНДЕР САЙДБАРА ──
function renderSidebar() {
  // Тарифы бригады
  const brEl = document.getElementById('brigade-rates');
  brEl.innerHTML = Object.entries(FOL_OPS).map(([k,v]) =>
    `<div class="field" style="display:flex;align-items:center;gap:6px">
      <label style="width:55px;margin:0">${v}</label>
      <input class="ci" style="width:70px" value="${(DB.brigRates[k]||'')}" placeholder="0.00"
        onchange="DB.brigRates['${k}']=parseFloat(this.value)||0;scheduleSave()">
    </div>`
  ).join('');

  // Сотрудники
  const empEl = document.getElementById('emp-list');
  empEl.innerHTML = DB.employees.map(e =>
    `<div class="emp-card">
      <div class="emp-name">${e.name} ${e.type==='office'?'<span class="badge off">оклад</span>':''}</div>
      <div class="emp-pos">${e.pos||''}</div>
      <div class="emp-btns">
        <button onclick="openEmpModal('${e.id}')">✏ Ред.</button>
        <button onclick="deleteEmp('${e.id}')" style="color:var(--red)">✕</button>
      </div>
    </div>`
  ).join('') || '<div style="color:var(--text3);font-size:11px;padding:8px 0">Нет сотрудников</div>';
}

// ── ПЕРИОД И ДНИ ──
function setPeriod(p) {
  curPeriod = p;
  document.getElementById('btn-p1').style.borderColor = p===1 ? 'var(--green)' : '';
  document.getElementById('btn-p2').style.borderColor = p===2 ? 'var(--green)' : '';
  document.getElementById('btn-p1').style.color = p===1 ? 'var(--green)' : '';
  document.getElementById('btn-p2').style.color = p===2 ? 'var(--green)' : '';
  curDay = '';
  renderContent();
}

function showTab(tab) {
  curTab = tab;
  document.getElementById('tab-day').className = 'tab' + (tab==='day'?' active':'');
  document.getElementById('tab-period').className = 'tab' + (tab==='period'?' active':'');
  renderContent();
}

function renderContent() {
  if (curTab === 'day') renderDayView();
  else renderPeriodView();
}

// ── ВИД ДНЯ ──
function renderDayView() {
  const month = getMonth();
  const days = getPeriodDays(month, curPeriod);
  const payDate = curPeriod===1
    ? `25.${month.slice(5)}.${month.slice(0,4)}`
    : `10.${String(+month.slice(5)+1).padStart(2,'0')}.${month.slice(0,4)}`;

  let html = `<div style="margin-bottom:12px;color:var(--text3);font-size:11px">
    Период ${curPeriod} · Выплата ${payDate}
  </div>`;

  // Сетка дней
  html += '<div class="days-grid">';
  days.forEach(date => {
    const d = DB.days[date];
    const hasData = d && ((d.indiv||[]).length || (d.brigade?.ops||[]).length || (d.after||[]).length);
    const we = isWeekend(date);
    const active = date === curDay;
    html += `<div class="day-btn ${we?'weekend':''} ${active?'active':''} ${hasData?'has-data':''}"
      onclick="selectDay('${date}')">${dayLabel(date)}</div>`;
  });
  html += '</div>';

// ── ВИД ПЕРИОДА ──
function renderPeriodView() {
  const month = getMonth();
  const days = getPeriodDays(month, curPeriod);
  const ndfl = parseFloat(document.getElementById('tax-ndfl').value)||13;
  const ins1 = parseFloat(document.getElementById('tax-ins1').value)||30.2;
  const ins2 = parseFloat(document.getElementById('tax-ins2').value)||7.6;
  const thresh = parseFloat(document.getElementById('tax-thresh').value)||40639.5;
  const periodKey = month + curPeriod;
  const payLabel = curPeriod===1 ? 'Выплата 25-го' : 'Выплата 10-го следующего месяца';

  // Собираем начисления и объёмы
  const byEmp = {};
  DB.employees.forEach(e => { byEmp[e.id] = {emp:e, gross:0}; });
  const volSew = {}, volFol = {};
  let volGlue = 0;

  days.forEach(date => {
    const t = calcDayTotals(date);
    Object.entries(t).forEach(([id,g]) => { if(byEmp[id]) byEmp[id].gross += g; });
    const d = DB.days[date]; if(!d) return;
    // Объёмы прошива
    (d.indiv||[]).forEach(r => {
      const art = SEW_OPS[r.op]||r.op||'';
      if(art) volSew[art]=(volSew[art]||0)+(r.qty||0);
    });
    // Объёмы фольгирования
    (d.brigade&&d.brigade.ops||[]).forEach(b => {
      const art = FOL_OPS[b.op]||b.op||'';
      if(art==='Клей FP') volGlue+=(b.qty||0);
      else if(art) volFol[art]=(volFol[art]||0)+(b.qty||0);
    });
    // После смены
    (d.after||[]).forEach(r => {
      const qty = r.qty||0;
      if(r.isBrigade) {
        const art = FOL_OPS[r.op]||r.op||'';
        if(art==='Клей FP') volGlue+=qty;
        else if(art) volFol[art]=(volFol[art]||0)+qty;
      } else {
        const art = SEW_OPS[r.op]||r.op||'';
        if(art) volSew[art]=(volSew[art]||0)+qty;
      }
    });
  });

  const totSew = Object.values(volSew).reduce((s,v)=>s+v,0);
  const totFol = Object.values(volFol).reduce((s,v)=>s+v,0);

  function calcTax(offBase) {
    const n = offBase * ndfl/100;
    const net = offBase - n;
    const ins = Math.min(offBase,thresh)*ins1/100 + Math.max(0,offBase-thresh)*ins2/100;
    return {ndfl:n, net, ins};
  }
  function getPrem(empId) {
    return DB.premiums[periodKey+'_'+empId] || {premium:0,cash:0};
  }

  const prodEmps = DB.employees.filter(e=>e.type!=='office');
  const offEmps  = DB.employees.filter(e=>e.type==='office');
  let pGross=0,pNdfl=0,pNet=0,pIns=0,pCost=0;
  let oGross=0,oNdfl=0,oNet=0,oIns=0,oCost=0;

  const thead = '<thead><tr>' +
    '<th>Сотрудник</th><th>Должность</th>' +
    '<th class="r">Сдельная/Оклад</th><th class="r">Премия</th>' +
    '<th class="r">Начислено</th><th class="r" style="color:var(--amber)">Наличка</th>' +
    '<th class="r">Офиц.база</th><th class="r">НДФЛ</th>' +
    '<th class="r">На руки</th><th class="r">Взносы</th><th class="r">Затраты</th>' +
    '</tr></thead>';

  function makeRow(e, base) {
    const g = base;
    const {premium,cash} = getPrem(e.id);
    const total   = g + premium;
    const offBase = Math.max(0, total - cash);
    const {ndfl:n,net,ins} = calcTax(offBase);
    const cost    = offBase + ins + cash;
    return {e, g, premium, cash, total, offBase, n, net, ins, cost};
  }

  function rowHtml(row, periodKey) {
    const {e,g,premium,cash,total,offBase,n,net,ins,cost} = row;
    return '<tr>' +
      '<td>' + e.name + '</td>' +
      '<td style="color:var(--text3)">' + (e.pos||'') + '</td>' +
      '<td class="num">' + fmt(g) + '</td>' +
      '<td><input class="ci r" style="width:70px" value="' + (premium||'') + '" placeholder="0" onchange="setPrem(\'' + e.id + '\',\'' + periodKey + '\',\'premium\',parseFloat(this.value)||0)"></td>' +
      '<td class="num" style="font-weight:600">' + fmt(total) + '</td>' +
      '<td><input class="ci r" style="width:70px" value="' + (cash||'') + '" placeholder="0" onchange="setPrem(\'' + e.id + '\',\'' + periodKey + '\',\'cash\',parseFloat(this.value)||0)"></td>' +
      '<td class="num">' + fmt(offBase) + '</td>' +
      '<td class="num" style="color:var(--red)">' + fmt(n) + '</td>' +
      '<td class="num g" style="font-weight:600">' + fmt(net) + '</td>' +
      '<td class="num" style="color:var(--blue)">' + fmt(ins) + '</td>' +
      '<td class="num" style="font-weight:700">' + fmt(cost) + '</td>' +
      '</tr>';
  }

  const prodData = prodEmps.map(e => makeRow(e, byEmp[e.id]?.gross||0)).filter(r=>r.total>0||r.cash>0);
  const offData  = offEmps.map(e => makeRow(e, (e.salary||0)/2));
  prodData.forEach(r=>{ pGross+=r.total;pNdfl+=r.n;pNet+=r.net;pIns+=r.ins;pCost+=r.cost; });
  offData.forEach(r=>{  oGross+=r.total;oNdfl+=r.n;oNet+=r.net;oIns+=r.ins;oCost+=r.cost; });

  const totCostAll = pCost + oCost;
  const totProdVol = totFol + totSew;
  const totVol = totProdVol + volGlue;
  const folSewCost = totVol>0 ? totCostAll * totProdVol / totVol : 0;
  const glueCost   = totVol>0 ? totCostAll * volGlue / totVol : 0;
  const costPerM2  = totProdVol>0 ? folSewCost/totProdVol : 0;
  const costPerKg  = volGlue>0 ? glueCost/volGlue : 0;

  function tfoot(tot,n,net,ins,cost) {
    return '<tfoot><tr style="font-weight:700;border-top:2px solid var(--border2)">' +
      '<td colspan="4" style="padding:6px 8px">Итого</td>' +
      '<td class="num">' + fmt(tot) + '</td><td></td><td></td>' +
      '<td class="num r">' + fmt(n) + '</td>' +
      '<td class="num g">' + fmt(net) + '</td>' +
      '<td class="num b">' + fmt(ins) + '</td>' +
      '<td class="num">' + fmt(cost) + '</td></tr></tfoot>';
  }

  let html = '<div style="margin-bottom:12px"><b>Расчётная ведомость — Период ' + curPeriod + ' · ' + month + '</b>' +
    '<span style="color:var(--text3);margin-left:12px;font-size:11px">' + payLabel + '</span></div>';

  // KPI
  html += '<div class="kpi">' +
    '<div class="kcard"><div class="lbl">Итого начислено</div><div class="val g">' + fmt(pGross+oGross) + ' ₽</div></div>' +
    '<div class="kcard"><div class="lbl">НДФЛ</div><div class="val r">' + fmt(pNdfl+oNdfl) + ' ₽</div></div>' +
    '<div class="kcard"><div class="lbl">На руки</div><div class="val">' + fmt(pNet+oNet) + ' ₽</div></div>' +
    '<div class="kcard"><div class="lbl">Взносы</div><div class="val b">' + fmt(pIns+oIns) + ' ₽</div></div>' +
    '<div class="kcard"><div class="lbl">Итого затрат</div><div class="val a">' + fmt(totCostAll) + ' ₽</div></div>' +
    '</div>';

  // Производство за период
  let vHtml = '<div class="card" style="margin-bottom:12px"><div class="card-head"><span class="card-title">📦 Производство за период ' + curPeriod + '</span></div><div class="card-body">';
  vHtml += '<div style="display:flex;flex-wrap:wrap;gap:16px">';
  vHtml += '<div><div style="font-size:10px;color:var(--text3);margin-bottom:5px">🔨 ПРОШИВ</div>';
  Object.entries(volSew).filter(([,v])=>v>0).forEach(([a,v])=>{ vHtml+='<div style="font-size:11px">'+a+': <b>'+fmtNum(v)+' м²</b></div>'; });
  if(!Object.values(volSew).some(v=>v>0)) vHtml+='<div style="color:var(--text3)">—</div>';
  vHtml += '<b>Итого: '+fmtNum(totSew)+' м²</b></div>';
  vHtml += '<div><div style="font-size:10px;color:var(--text3);margin-bottom:5px">◈ ФОЛЬГИРОВАНИЕ</div>';
  Object.entries(volFol).filter(([,v])=>v>0).forEach(([a,v])=>{ vHtml+='<div style="font-size:11px">'+a+': <b>'+fmtNum(v)+' м²</b></div>'; });
  if(!Object.values(volFol).some(v=>v>0)) vHtml+='<div style="color:var(--text3)">—</div>';
  vHtml += '<b>Итого: '+fmtNum(totFol)+' м²</b></div>';
  vHtml += '<div><div style="font-size:10px;color:var(--text3);margin-bottom:5px">🧴 КЛЕЙ FP</div><div style="font-size:18px;font-weight:700">'+fmtNum(volGlue)+' кг</div></div>';
  vHtml += '</div>';
  if (totCostAll > 0) {
    vHtml += '<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">';
    vHtml += '<div style="font-size:10px;color:var(--text3);margin-bottom:6px">ЗАТРАТЫ НА ПЕРСОНАЛ / ЕД. ПРОДУКЦИИ</div>';
    vHtml += '<div style="display:flex;gap:10px;flex-wrap:wrap">';
    if (totProdVol>0) vHtml += '<div style="background:var(--bg3);border-radius:6px;padding:8px 12px"><div style="font-size:10px;color:var(--text3)">Прошив + Фольгирование (1 м²)</div><div style="font-size:18px;font-weight:700;color:var(--amber)">'+fmt(costPerM2)+' ₽</div></div>';
    if (volGlue>0) vHtml += '<div style="background:var(--bg3);border-radius:6px;padding:8px 12px"><div style="font-size:10px;color:var(--text3)">Клей FP (1 кг)</div><div style="font-size:18px;font-weight:700;color:var(--amber)">'+fmt(costPerKg)+' ₽</div></div>';
    vHtml += '</div></div>';
  }
  vHtml += '</div></div>';
  html += vHtml;

  // Производственные
  if (prodEmps.length) {
    html += '<div class="card" style="margin-bottom:12px"><div class="card-head"><span class="card-title" style="color:var(--purple)">🔨 Производственный персонал</span></div>';
    html += '<div style="overflow-x:auto"><table>' + thead + '<tbody>';
    html += prodData.length ? prodData.map(r=>rowHtml(r,periodKey)).join('') : '<tr><td colspan="11" style="text-align:center;color:var(--text3);padding:12px">Нет данных</td></tr>';
    html += '</tbody>' + (pGross?tfoot(pGross,pNdfl,pNet,pIns,pCost):'') + '</table></div></div>';
  }

  // Офисные
  if (offEmps.length) {
    html += '<div class="card"><div class="card-head"><span class="card-title" style="color:var(--blue)">💼 Офисный персонал</span></div>';
    html += '<div style="overflow-x:auto"><table>' + thead + '<tbody>';
    html += offData.map(r=>rowHtml(r,periodKey)).join('');
    html += '</tbody>' + (oGross?tfoot(oGross,oNdfl,oNet,oIns,oCost):'') + '</table></div></div>';
  }

  document.getElementById('content').innerHTML = html;
}

// ── ДЕЙСТВИЯ ──
function selectDay(date) { curDay = date; renderDayView(); }

function toggleAbsence(date, empId, type) {
  const d = getDay(date);
  if (!type) delete d.absences[empId];
  else {
    d.absences[empId] = type;
    // Убираем из бригады
    const m = d.brigade?.members||[];
    const idx = m.indexOf(empId);
    if (idx>=0) m.splice(idx,1);
  }
  scheduleSave(); renderDayView();
}

function addIndiv(date) {
  const d = getDay(date);
  const firstEmp = DB.employees.find(e=>e.type!=='office');
  d.indiv.push({empId:firstEmp?.id||'', op:'sew5f', qty:0, rate:firstEmp?.rates?.sew5f||0, gross:0});
  scheduleSave(); renderDayView();
}
function updIndiv(date,i,key,val) { getDay(date).indiv[i][key]=val; }
function autoRate(date,i) {
  const r = getDay(date).indiv[i];
  const emp = DB.employees.find(e=>e.id===r.empId);
  if (emp?.rates?.[r.op]) r.rate = emp.rates[r.op];
  renderDayView();
}
function calcIndiv(date,i) {
  const r = getDay(date).indiv[i];
  r.gross = (r.qty||0)*(r.rate||0);
  scheduleSave(); renderDayView();
}
function delIndiv(date,i) { getDay(date).indiv.splice(i,1); scheduleSave(); renderDayView(); }

function addBrigOp(date) {
  const d = getDay(date);
  const op = 'fol_5f';
  d.brigade.ops.push({op, qty:0, rate:DB.brigRates[op]||0, gross:0});
  scheduleSave(); renderDayView();
}
function updBrigOp(date,i,key,val) { getDay(date).brigade.ops[i][key]=val; }
function autoBrigRate(date,i) {
  const b = getDay(date).brigade.ops[i];
  b.rate = DB.brigRates[b.op]||0;
  renderDayView();
}
function calcBrig(date) {
  const d = getDay(date);
  d.brigade.ops.forEach(b => { b.gross=(b.qty||0)*(b.rate||0); });
  scheduleSave(); renderDayView();
}
function delBrigOp(date,i) { getDay(date).brigade.ops.splice(i,1); scheduleSave(); renderDayView(); }
function toggleBrigMember(date,empId,checked) {
  const m = getDay(date).brigade.members;
  if (checked && !m.includes(empId)) m.push(empId);
  if (!checked) { const i=m.indexOf(empId); if(i>=0) m.splice(i,1); }
  scheduleSave(); renderDayView();
}

function addAfter(date,isBrigade) {
  const d = getDay(date);
  const firstEmp = DB.employees[0];
  if (isBrigade) d.after.push({isBrigade:true,op:'fol_5f',qty:0,rate:DB.brigRates.fol_5f||0,gross:0,members:[]});
  else d.after.push({empId:firstEmp?.id||'',op:'sew5f',qty:0,rate:firstEmp?.rates?.sew5f||0,gross:0});
  scheduleSave(); renderDayView();
}
function updAfter(date,i,key,val) { getDay(date).after[i][key]=val; }
function autoRateAfter(date,i) {
  const r = getDay(date).after[i];
  const emp = DB.employees.find(e=>e.id===r.empId);
  if (emp?.rates?.[r.op]) r.rate = emp.rates[r.op];
  renderDayView();
}
function autoBrigRateAfter(date,i) {
  const r = getDay(date).after[i];
  r.rate = DB.brigRates[r.op]||0;
  renderDayView();
}
function calcAfter(date,i) {
  const r = getDay(date).after[i];
  r.gross=(r.qty||0)*(r.rate||0);
  scheduleSave(); renderDayView();
}
function delAfter(date,i) { getDay(date).after.splice(i,1); scheduleSave(); renderDayView(); }
function toggleAfterMember(date,i,empId,checked) {
  const r = getDay(date).after[i];
  if (!r.members) r.members=[];
  if (checked&&!r.members.includes(empId)) r.members.push(empId);
  if (!checked){const j=r.members.indexOf(empId);if(j>=0)r.members.splice(j,1);}
  r.gross=(r.qty||0)*(r.rate||0);
  scheduleSave(); renderDayView();
}

function setPrem(empId,periodKey,field,val) {
  if (!DB.premiums[`${periodKey}_${empId}`]) DB.premiums[`${periodKey}_${empId}`]={premium:0,cash:0};
  DB.premiums[`${periodKey}_${empId}`][field]=val;
  scheduleSave(); renderPeriodView();
}

// ── СОТРУДНИКИ ──
let editEmpId = null;
const SEW_KEYS = Object.keys(SEW_OPS);

function openEmpModal(id) {
  editEmpId = id||null;
  const e = id ? DB.employees.find(x=>x.id===id) : null;
  document.getElementById('emp-modal-title').textContent = id ? 'Редактировать сотрудника' : 'Новый сотрудник';
  document.getElementById('e-name').value = e?.name||'';
  document.getElementById('e-pos').value = e?.pos||'';
  document.getElementById('e-type').value = e?.type||'prod';
  document.getElementById('e-salary').value = e?.salary||0;
  // Тарифы
  const grid = document.getElementById('e-rates-grid');
  grid.innerHTML = SEW_KEYS.map(k=>`
    <div class="mfield">
      <label>${SEW_OPS[k]}</label>
      <input id="er-${k}" class="ci" value="${e?.rates?.[k]?(+e.rates[k]).toFixed(2):''}" placeholder="0.00" step="0.01">
    </div>`).join('');
  toggleEmpType();
  document.getElementById('emp-modal').className = 'modal-bg show';
}
function toggleEmpType() {
  const t = document.getElementById('e-type').value;
  document.getElementById('e-salary-block').style.display = t==='office'?'':'none';
  document.getElementById('e-rates-block').style.display = t==='office'?'none':'';
}
function closeEmpModal() { document.getElementById('emp-modal').className='modal-bg'; }
function saveEmp() {
  const name = document.getElementById('e-name').value.trim();
  if (!name) { alert('Введите ФИО'); return; }
  const type = document.getElementById('e-type').value;
  const rates = {};
  SEW_KEYS.forEach(k=>{ const v=parseFloat(document.getElementById(`er-${k}`)?.value); if(v>0) rates[k]=v; });
  const emp = {
    id: editEmpId||uid(), name,
    pos: document.getElementById('e-pos').value,
    type, salary: parseFloat(document.getElementById('e-salary').value)||0,
    rates
  };
  if (editEmpId) DB.employees = DB.employees.map(e=>e.id===editEmpId?emp:e);
  else DB.employees.push(emp);
  closeEmpModal();
  scheduleSave();
  renderSidebar();
  renderContent();
}
function deleteEmp(id) {
  if (!confirm('Удалить сотрудника?')) return;
  DB.employees = DB.employees.filter(e=>e.id!==id);
  scheduleSave(); renderSidebar(); renderContent();
}

// ── ИНИЦИАЛИЗАЦИЯ ──
function init() {
  const now = new Date();
  document.getElementById('sel-month').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('sel-month').onchange = () => { curDay=''; renderContent(); };
  setPeriod(1);
  loadAll();
}

init();
</script>
