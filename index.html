<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Зарплата НПП ОЗТ</title>
<style>
:root{--bg:#0f1117;--bg2:#161b22;--bg3:#1c2128;--bg4:#21262d;--bg5:#2d333b;--border:#30363d;--border2:#444c56;--text:#e6edf3;--text2:#adbac7;--text3:#768390;--green:#4ade80;--red:#f87171;--amber:#fbbf24;--blue:#60a5fa;--purple:#a78bfa;--r:6px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.ver-bar{background:#1a1a2e;color:var(--green);text-align:center;padding:2px;font-size:10px;font-family:monospace;flex-shrink:0}
.app{display:flex;flex:1;overflow:hidden}
.sidebar{width:210px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sb-top{padding:10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-logo{font-weight:700;font-size:14px;margin-bottom:8px}
.sb-days{flex:1;overflow-y:auto;padding:6px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.tab{padding:7px 16px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text3);border-bottom:2px solid transparent}
.tab.active{color:var(--text);border-bottom-color:var(--green)}
.content{flex:1;overflow-y:auto;padding:12px}
.status{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--bg4)}
.status.ok{background:rgba(74,222,128,.15);color:var(--green)}
.status.err{background:rgba(248,113,113,.15);color:var(--red)}
.status.loading{background:rgba(96,165,250,.15);color:var(--blue)}
.btn{padding:4px 10px;border-radius:var(--r);border:1px solid var(--border);cursor:pointer;font-size:11px;background:var(--bg3);color:var(--text2)}
.btn:hover{background:var(--bg4)}
.btn.g{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.3);color:var(--green)}
.btn.sm{padding:2px 7px;font-size:10px}
.btn.del{color:var(--red);border-color:transparent;background:transparent}
.day-btn{display:block;width:100%;text-align:left;padding:5px 8px;border-radius:var(--r);border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:11px;font-weight:500;position:relative}
.day-btn:hover{background:var(--bg4)}
.day-btn.active{background:var(--bg5);color:var(--green);outline:1px solid rgba(74,222,128,.3)}
.day-btn.we{color:var(--red)}
.day-btn.we.active{color:var(--green)}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);display:inline-block;margin-left:4px;vertical-align:middle}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px}
.card-hdr{padding:7px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.card-title{font-weight:600;font-size:12px}
.card-body{padding:10px 12px}
.card-actions{margin-left:auto;display:flex;gap:5px}
.kpi-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.kcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;min-width:130px;flex:1}
.lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.val{font-size:16px;font-weight:700}
.val.g{color:var(--green)}.val.r{color:var(--red)}.val.a{color:var(--amber)}.val.b{color:var(--blue)}
.ksub{font-size:9px;color:var(--text3);margin-top:1px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:var(--bg3);color:var(--text3);font-weight:600;padding:5px 8px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:4px 8px;border-bottom:1px solid var(--border);vertical-align:middle}td.num input,td.num select{margin:0 auto;display:block}
tr:hover td{background:rgba(255,255,255,.02)}
.num{text-align:right;font-family:monospace}.g{color:var(--green)}.r{color:var(--red)}.a{color:var(--amber)}.b{color:var(--blue)}
tfoot td{font-weight:700;background:var(--bg3)}
.ci{background:transparent;border:1px solid var(--border);color:var(--text);padding:2px 5px;border-radius:4px;font-size:11px;font-family:monospace}
.ci:focus{outline:none;border-color:var(--blue);background:var(--bg3)}
.sel{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:3px 6px;border-radius:4px;font-size:11px}
.inp{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:var(--r);font-size:12px;width:100%}
.inp:focus{outline:none;border-color:var(--blue)}
.field{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.field label{font-size:10px;color:var(--text3)}
.att-grid{display:flex;flex-wrap:wrap;gap:6px;padding:8px}
.att-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;min-width:155px}
.att-card.brig{border-color:rgba(74,222,128,.3)}
.att-card.abs{border-color:rgba(251,191,36,.3)}
.att-name{font-weight:600;font-size:11px;margin-bottom:1px}
.att-pos{font-size:9px;color:var(--text3);margin-bottom:4px}
.att-earn{font-size:10px;margin-bottom:4px;line-height:1.6}
.att-btns{display:flex;gap:3px;flex-wrap:wrap}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:20px;width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-weight:700;font-size:14px;margin-bottom:14px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;padding-top:10px;border-top:1px solid var(--border)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.badge{display:inline-block;padding:1px 6px;border-radius:10px;font-size:9px;font-weight:600}
.badge.g{background:rgba(74,222,128,.2);color:var(--green)}
.badge.b{background:rgba(96,165,250,.2);color:var(--blue)}
.subsec{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:8px 0 4px}
</style>
</head>
<body>
<div class="ver-bar">ВЕРСИЯ 3.1 — НПП ОЗТ Зарплата</div>
<div class="app">
  <div class="sidebar">
    <div class="sb-top">
      <div class="sb-logo">НПП ОЗТ</div>
      <div class="field" style="margin-bottom:6px">
        <label>Месяц</label>
        <input type="month" class="inp" id="sel-month" onchange="onMonthChange()">
      </div>
      <div style="display:flex;gap:4px">
        <button class="btn sm" id="btn-p1" onclick="setPeriod(1)" style="flex:1">П1 1–15</button>
        <button class="btn sm" id="btn-p2" onclick="setPeriod(2)" style="flex:1">П2 16–кон</button>
      </div>
    </div>
    <div class="sb-days" id="day-list"></div>
  </div>
  <div class="main">
    <div class="topbar">
      <span class="status" id="status">—</span>
      <button class="btn" onclick="saveAll()">💾 Сохранить</button>
      <button class="btn" onclick="loadAll()">↻ Загрузить</button>
    </div>
    <div class="tabs">
      <div class="tab active" id="tab-day" onclick="showTab('day')">📅 День</div>
      <div class="tab" id="tab-period" onclick="showTab('period')">📊 Итог периода</div>
      <div class="tab" id="tab-emps" onclick="showTab('emps')">👤 Сотрудники</div>
    </div>
    <div class="content" id="content">
      <div style="color:var(--text3);padding:20px">Выберите день в списке слева</div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Отмена</button>
      <button class="btn g" onclick="modalSave()">Сохранить</button>
    </div>
  </div>
</div>

<script>
'use strict';

const GS = 'https://script.google.com/macros/s/AKfycbzC0vd34pjqKioZyiy_f7P9zTbrmmlZO6Xacw1XZSVvv1vSfsq2dJwi4vK1bhrzRZUwkQ/exec';

const SEW_OPS = {sew5f:'5П',sew5nf:'5НФ',sew8f:'8П',sew8nf:'8НФ',sew10f:'10П',sew10nf:'10НФ',sew13f:'13П',sew13nf:'13НФ',sew16f:'16П',sew16nf:'16НФ'};
const FOL_OPS = {fol_5f:'5Ф',fol_5tf:'5ТФ',fol_8f:'8Ф',fol_8tf:'8ТФ',fol_10f:'10Ф',fol_10tf:'10ТФ',fol_13f:'13Ф',fol_13tf:'13ТФ',fol_16f:'16Ф',fol_16tf:'16ТФ',glue:'Клей FP'};
const ALL_OPS = Object.assign({}, SEW_OPS, FOL_OPS);
// Метров в рулоне для каждого артикула фольгирования
const ROLL_M2 = {fol_5f:24,fol_5tf:24,fol_8f:12,fol_8tf:12,fol_10f:12,fol_10tf:12,fol_13f:12,fol_13tf:12,fol_16f:12,fol_16tf:12};
// Для прошива метраж в рулоне не стандартизирован — пользователь вводит рулоны и м² вручную
// Если нужна автоконвертация — задайте значения здесь
const SEW_ROLL_M2 = {sew5f:24,sew5nf:24,sew8f:12,sew8nf:12,sew10f:12,sew10nf:12,sew13f:12,sew13nf:12,sew16f:12,sew16nf:12};
const ABSENCE = {vacation:'Отпуск',sick:'Больничный',admin:'Административный'};

const DB = {
  employees: [],
  days: {},
  premiums: {},
  brigRates: {}
};

let curPeriod = 1;
let curDay    = '';
let curTab    = 'day';
let isReady   = false;

// ── ФОРМАТИРОВАНИЕ ──
function fmt(n)    { return (+(n||0)).toLocaleString('ru',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtN(n)   { return (+(n||0)).toLocaleString('ru',{minimumFractionDigits:0,maximumFractionDigits:2}); }
function uid()     { return Math.random().toString(36).slice(2,9); }
function getMonth(){ return document.getElementById('sel-month').value || new Date().toISOString().slice(0,7); }

// ── ДАННЫЕ ──
function getDay(date) {
  if (!DB.days[date]) DB.days[date] = {indiv:[],brigade:{ops:[],members:[]},after:[],absences:{}};
  return DB.days[date];
}

function getPeriodDays(month, period) {
  if (!month) return [];
  var parts = month.split('-');
  var y = +parts[0], m = +parts[1];
  var start = period === 1 ? 1 : 16;
  var end   = period === 1 ? 15 : new Date(y, m, 0).getDate();
  var days  = [];
  for (var d = start; d <= end; d++) {
    days.push(y + '-' + String(m).padStart(2,'0') + '-' + String(d).padStart(2,'0'));
  }
  return days;
}

function isWE(date) { var d = new Date(date).getDay(); return d===0||d===6; }

function calcDayTotals(date) {
  var d = DB.days[date];
  if (!d) return {};
  var t = {};
  (d.indiv||[]).forEach(function(r){ t[r.empId]=(t[r.empId]||0)+(r.gross||0); });
  var mems = d.brigade && d.brigade.members || [];
  var brigTotal = (d.brigade && d.brigade.ops||[]).reduce(function(s,b){return s+(b.gross||0);},0);
  var per = mems.length > 0 ? brigTotal / mems.length : 0;
  mems.forEach(function(id){ t[id]=(t[id]||0)+per; });
  (d.after||[]).forEach(function(r){
    if (r.isBrigade) {
      var ms=r.members||[], p=ms.length>0?(r.gross||0)/ms.length:0;
      ms.forEach(function(id){ t[id]=(t[id]||0)+p; });
    } else {
      t[r.empId]=(t[r.empId]||0)+(r.gross||0);
    }
  });
  return t;
}

function getBrigRate(op) { return DB.brigRates[op]||0; }

function getEmpRate(empId, op) {
  var e = DB.employees.find(function(x){return x.id===empId;});
  return e && e.rates && e.rates[op] || 0;
}

// ── GOOGLE SHEETS ──
function setStatus(type, text) {
  var el = document.getElementById('status');
  el.className = 'status ' + type;
  el.textContent = text;
}

async function gsCall(params) {
  var qs = new URLSearchParams(params).toString();
  var res = await fetch(GS + '?' + qs);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  var j = await res.json();
  if (!j.ok) throw new Error(j.error || 'GS error');
  return j;
}

async function gsLoad(table) {
  try {
    var j = await gsCall({action:'load', table:table});
    var rows = j.rows || [];
    if (rows.length < 2) return [];
    var keys = rows[0];
    return rows.slice(1).map(function(row) {
      var obj = {};
      keys.forEach(function(k,i){ try{obj[k]=JSON.parse(row[i]);}catch(e){obj[k]=row[i];} });
      return obj;
    });
  } catch(e) { console.warn('gsLoad failed:', table, e.message); return []; }
}

async function gsSave(table, rows) {
  if (!rows || rows.length === 0) {
    await gsCall({action:'clear', table:table});
    return;
  }
  var keys = Object.keys(rows[0]);
  for (var i = 0; i < rows.length; i++) {
    var vals = keys.map(function(k){
      var v = rows[i][k];
      return v == null ? '' : JSON.stringify(v);
    });
    var batch = i === 0 ? [keys, vals] : [vals];
    var params = {action:'save', table:table, rows:JSON.stringify(batch), clear: i===0?'1':'0'};
    var qs = new URLSearchParams(params).toString();
    console.log('gsSave', table, 'row', i, 'urlLen:', qs.length);
    var res = await fetch(GS + '?' + qs);
    if (!res.ok) throw new Error('HTTP ' + res.status + ' saving ' + table);
    var j = await res.json();
    if (!j.ok) throw new Error((j.error||'GS err') + ' on ' + table);
  }
}

async function loadAll() {
  setStatus('loading','загрузка...');
  isReady = false;
  try {
    var emps  = await gsLoad('sal_employees');
    var days  = await gsLoad('sal_days');
    var prems = await gsLoad('sal_premiums');
    var sets  = await gsLoad('sal_settings');

    if (emps.length)  DB.employees = emps;

    if (days.length) {
      days.forEach(function(r){
        try { DB.days[r.date] = JSON.parse(r.data); } catch(e) {}
      });
    }

    if (prems.length && prems[0] && prems[0].data) {
      try { DB.premiums = JSON.parse(prems[0].data); } catch(e) {}
    }

    if (sets.length && sets[0] && sets[0].data) {
      try { DB.brigRates = JSON.parse(sets[0].data); } catch(e) {}
    }

    isReady = true;
    setStatus('ok','загружено ✓');
    buildDayList();
    renderContent();
  } catch(e) {
    isReady = true;
    setStatus('err','ошибка загрузки');
    console.error('loadAll:', e);
  }
}

async function saveAll() {
  if (!isReady) return;
  setStatus('loading','сохранение...');
  try {
    await gsSave('sal_employees', DB.employees);

    var dayRows = Object.keys(DB.days)
      .filter(function(date) {
        var d = DB.days[date];
        return (d.indiv&&d.indiv.length) || (d.brigade&&d.brigade.ops&&d.brigade.ops.length) ||
               (d.after&&d.after.length) || Object.keys(d.absences||{}).length;
      })
      .map(function(date) { return {date:date, data:JSON.stringify(DB.days[date])}; });

    console.log('saving days:', dayRows.length);
    await gsSave('sal_days', dayRows);
    await gsSave('sal_premiums', [{data:JSON.stringify(DB.premiums)}]);
    await gsSave('sal_settings', [{data:JSON.stringify(DB.brigRates)}]);

    setStatus('ok','сохранено ✓');
    console.log('saveAll done');
  } catch(e) {
    setStatus('err','ошибка: ' + e.message);
    console.error('saveAll:', e);
  }
}

// ── НАВИГАЦИЯ ──
function onMonthChange() { curDay=''; buildDayList(); renderContent(); }

function setPeriod(p) {
  curPeriod = p;
  document.getElementById('btn-p1').style.color = p===1?'var(--green)':'';
  document.getElementById('btn-p2').style.color = p===2?'var(--green)':'';
  curDay = '';
  buildDayList();
  renderContent();
}

function showTab(tab) {
  curTab = tab;
  ['day','period','emps'].forEach(function(t){
    document.getElementById('tab-'+t).className = 'tab' + (t===tab?' active':'');
  });
  renderContent();
}

function buildDayList() {
  var month = getMonth();
  var days  = getPeriodDays(month, curPeriod);
  var DAYS  = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
  document.getElementById('day-list').innerHTML = days.map(function(date) {
    var dt   = new Date(date + 'T00:00:00');
    var we   = isWE(date);
    var d    = DB.days[date];
    var has  = d && ((d.indiv&&d.indiv.length)||(d.brigade&&d.brigade.ops&&d.brigade.ops.length)||
                     (d.after&&d.after.length)||Object.keys(d.absences||{}).length);
    var tot  = Object.values(calcDayTotals(date)).reduce(function(s,v){return s+v;},0);
    var cls  = 'day-btn' + (we?' we':'') + (date===curDay?' active':'');
    return '<button class="' + cls + '" onclick="selectDay(\'' + date + '\')">' +
      String(dt.getDate()).padStart(2,'0') + '.' + String(dt.getMonth()+1).padStart(2,'0') + ' ' + DAYS[dt.getDay()] +
      (has ? '<span class="dot"></span>' : '') +
      (tot > 0 ? '<br><span style="font-size:9px;color:var(--text3);font-weight:400">' + fmt(tot) + ' ₽</span>' : '') +
      '</button>';
  }).join('') || '<div style="color:var(--text3);font-size:10px;padding:8px">Выберите месяц</div>';
}

function selectDay(date) {
  curDay = date;
  curTab = 'day';
  ['day','period','emps'].forEach(function(t){
    document.getElementById('tab-'+t).className = 'tab' + (t==='day'?' active':'');
  });
  buildDayList();
  renderContent();
}

function renderContent() {
  if (curTab === 'day')    renderDay();
  else if (curTab === 'period') renderPeriod();
  else renderEmps();
}

// ── РЕНДЕР ДНЯ ──
function renderDay() {
  if (!curDay) {
    document.getElementById('content').innerHTML = '<div style="color:var(--text3);padding:20px">Выберите день в списке слева</div>';
    return;
  }
  var day    = getDay(curDay);
  var prods  = DB.employees.filter(function(e){return e.type!=='office';});
  var offs   = DB.employees.filter(function(e){return e.type==='office';});
  var totals = calcDayTotals(curDay);
  var bMems  = day.brigade && day.brigade.members || [];
  var bTotal = (day.brigade && day.brigade.ops||[]).reduce(function(s,b){return s+(b.gross||0);},0);
  var bPer   = bMems.length > 0 ? bTotal / bMems.length : 0;
  var DAYS   = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
  var dt     = new Date(curDay + 'T00:00:00');
  var html   = '<div style="font-weight:700;font-size:14px;margin-bottom:10px">' +
    DAYS[dt.getDay()] + ', ' + String(dt.getDate()).padStart(2,'0') + '.' +
    String(dt.getMonth()+1).padStart(2,'0') + '.' + dt.getFullYear() + '</div>';

  // Явка производственных
  if (prods.length) {
    html += '<div class="card"><div class="card-hdr"><div class="card-title a">👥 Явка производственных</div></div><div class="att-grid">';
    prods.forEach(function(e) {
      var abs = (day.absences||{})[e.id];
      var inB = bMems.indexOf(e.id) >= 0;
      var sewG = (day.indiv||[]).filter(function(r){return r.empId===e.id;}).reduce(function(s,r){return s+(r.gross||0);},0);
      var tot  = totals[e.id]||0;
      var cls  = 'att-card' + (inB?' brig':'') + (abs?' abs':'');
      html += '<div class="' + cls + '">';
      html += '<div class="att-name">' + e.name + '</div>';
      html += '<div class="att-pos">' + (e.pos||'') + '</div>';
      if (abs) {
        html += '<div style="color:var(--amber);font-size:10px;margin-bottom:4px">📋 ' + ABSENCE[abs] + '</div>';
      } else if (tot > 0) {
        html += '<div class="att-earn">';
        if (sewG > 0) html += '<span style="color:var(--purple)">🔨 ' + fmt(sewG) + '</span> ';
        if (inB && bPer > 0) html += '<span style="color:var(--green)">◈ ' + fmt(bPer) + '</span>';
        html += '<br><b>' + fmt(tot) + ' ₽</b></div>';
      }
      html += '<div class="att-btns">';
      Object.keys(ABSENCE).forEach(function(k){
        var active = abs===k;
        html += '<button class="btn sm' + (active?' g':'') + '" onclick="toggleAbsence(\'' + curDay + '\',\'' + e.id + '\',\'' + k + '\')">' + ABSENCE[k] + '</button>';
      });

          '<td><input class="ci num" style="width:60px" value="' + (r.rate?(+r.rate).toFixed(2):'') + '" onchange="updAfter(' + i + ',\'rate\',parseFloat(this.value)||0)"></td>' +
          '<td class="num g">' + fmt(r.gross||0) + '</td>' +

        }).join('');
        var allOpts = Object.keys(ALL_OPS).map(function(k){

        }).join('');
        html += '<tr>' +
          '<td><select class="sel" style="width:110px" onchange="updAfter(' + i + ',\'empId\',this.value)">' + empOpts2 + '</select></td>' +

  // Офисные
  if (offs.length) {
    html += '<div class="card"><div class="card-hdr"><div class="card-title" style="color:var(--blue)">💼 Офисные сотрудники</div></div><div class="att-grid">';
    offs.forEach(function(e) {
      var abs = (day.absences||{})[e.id];
      html += '<div class="att-card' + (abs?' abs':'') + '">' +
        '<div class="att-name">' + e.name + '</div>' +

        (abs ? '<div style="color:var(--amber);font-size:10px;margin-bottom:4px">📋 ' + ABSENCE[abs] + '</div>' :
               '<div style="color:var(--green);font-size:10px;margin-bottom:4px">✓ Рабочий день</div>') +
        '<div class="att-btns">';
      Object.keys(ABSENCE).forEach(function(k){
        html += '<button class="btn sm' + (abs===k?' g':'') + '" onclick="toggleAbsence(\'' + curDay + '\',\'' + e.id + '\',\'' + k + '\')">' + ABSENCE[k] + '</button>';

// ── ДЕЙСТВИЯ ДНЯ ──
function toggleAbsence(date, empId, type) {
  var d = getDay(date);
  if (!type) { delete d.absences[empId]; }
  else {
    d.absences[empId] = type;
    var m = d.brigade && d.brigade.members || [];
    var idx = m.indexOf(empId);
    if (idx >= 0) m.splice(idx, 1);
  }
  buildDayList();
  renderContent();
}

function updIndiv(i, key, val) {
  var d = getDay(curDay);
  d.indiv[i][key] = val;
  if (key==='qty') d.indiv[i].rolls = 0; // ручной ввод м² — сбрасываем рулоны
  d.indiv[i].gross = (d.indiv[i].qty||0) * (d.indiv[i].rate||0);
  renderContent();
}
function autoSewRate(i) {
  var d = getDay(curDay), r = d.indiv[i];
  var rate = getEmpRate(r.empId, r.op);
  if (rate) { r.rate = rate; r.gross = (r.qty||0)*rate; renderContent(); }
}
function addIndiv() {
  var d = getDay(curDay);
  var fp = DB.employees.find(function(e){return e.type!=='office';});
  d.indiv.push({empId:fp?fp.id:'', op:'sew5f', qty:0, rate:fp?getEmpRate(fp.id,'sew5f'):0, gross:0});
  renderContent();
}
function delIndiv(i) { getDay(curDay).indiv.splice(i,1); renderContent(); }

function updBrig(i, key, val) {
  var d = getDay(curDay), b = d.brigade.ops[i];
  b[key] = val;
  if (key==='op') {
    var r2 = getBrigRate(val);
    if(r2) b.rate = r2;
    b.rolls = 0; // сброс при смене артикула
  }
  if (key==='qty') b.rolls = 0; // ввод м²/кг вручную — сбрасываем рулоны/вёдра
  b.gross = (b.qty||0)*(b.rate||0);
  renderContent();
}
function addBrigOp() {
  var d = getDay(curDay);
  d.brigade.ops.push({op:'fol_5f', qty:0, rate:getBrigRate('fol_5f'), gross:0});
  renderContent();
}
function delBrig(i) { getDay(curDay).brigade.ops.splice(i,1); renderContent(); }
function updBrigRolls(i, rolls) {
  var d = getDay(curDay), b = d.brigade.ops[i];
  b.rolls = rolls;
  var isGlue = b.op === 'glue';
  var factor = isGlue ? 25 : (ROLL_M2[b.op] || 0); // вёдра→кг или рулоны→м²
  if (factor > 0) b.qty = Math.round(rolls * factor * 100) / 100;
  b.gross = (b.qty||0) * (b.rate||0);
  renderContent();
}
function toggleBrigMember(empId, checked) {
  var d = getDay(curDay), m = d.brigade.members;
  if (checked && m.indexOf(empId)<0) m.push(empId);
  if (!checked) { var idx=m.indexOf(empId); if(idx>=0) m.splice(idx,1); }
  renderContent();
}

function updSewRolls(i, rolls) {
  var d = getDay(curDay), r = d.indiv[i];
  r.rolls = rolls;
  var m2 = SEW_ROLL_M2[r.op] || 0;
  if (m2 > 0) { r.qty = Math.round(rolls * m2 * 100) / 100; }
  // Если m2=0 (нет стандарта) — просто сохраняем рулоны, м² вводится вручную
  r.gross = (r.qty||0) * (r.rate||0);
  renderContent();
}

function updAfter(i, key, val) {
  var d = getDay(curDay), r = d.after[i];
  r[key] = val;
  if (key==='op' && r.isBrigade) { var br=getBrigRate(val); if(br) r.rate=br; }
  r.gross = (r.qty||0)*(r.rate||0);
  renderContent();
}
function toggleAfterMem(i, empId, checked) {
  var d = getDay(curDay), r = d.after[i], m = r.members||[];
  if (checked && m.indexOf(empId)<0) m.push(empId);
  if (!checked) { var idx=m.indexOf(empId); if(idx>=0) m.splice(idx,1); }
  r.members = m;
  r.gross = (r.qty||0)*(r.rate||0);
  renderContent();
}
function addAfter(isBrigade) {
  var d = getDay(curDay);
  if (isBrigade) {
    d.after.push({isBrigade:true, op:'fol_5f', qty:0, rate:getBrigRate('fol_5f'), gross:0, members:[]});
  } else {
    var fp = DB.employees.find(function(e){return e.type!=='office';});
    d.after.push({isBrigade:false, empId:fp?fp.id:'', op:'sew5f', qty:0, rate:0, gross:0});
  }
  renderContent();
}
function delAfter(i) { getDay(curDay).after.splice(i,1); renderContent(); }

// ── ИТОГ ПЕРИОДА ──
function renderPeriod() {
  var month  = getMonth();
  var days   = getPeriodDays(month, curPeriod);
  var ndfl   = parseFloat(document.getElementById('p-ndfl')?document.getElementById('p-ndfl').value:13)||13;
  var ins1   = parseFloat(document.getElementById('p-ins1')?document.getElementById('p-ins1').value:30.2)||30.2;
  var ins2   = parseFloat(document.getElementById('p-ins2')?document.getElementById('p-ins2').value:7.6)||7.6;
  var thresh = parseFloat(document.getElementById('p-thresh')?document.getElementById('p-thresh').value:(DB.settings&&DB.settings.thresh||40639.5))||(DB.settings&&DB.settings.thresh||40639.5);
  var pKey   = month + curPeriod;
  var payLbl = curPeriod===1?'Выплата 25-го':'Выплата 10-го следующего месяца';

  function calcTax(base) {
    var tax = base * ndfl/100;
    var net = base - tax;
    var ins = Math.min(base,thresh)*ins1/100 + Math.max(0,base-thresh)*ins2/100;
    return {tax:tax, net:net, ins:ins};
  }
  function getPrem(empId) {
    return DB.premiums[pKey+'_'+empId] || {premium:0, cash:0};
  }

  // Собираем начисления
  var earned = {};
  DB.employees.forEach(function(e){ earned[e.id]=0; });
  var volSew={}, volFol={}, volGlue=0;
  days.forEach(function(date) {
    var t = calcDayTotals(date);
    Object.keys(t).forEach(function(id){ if(earned[id]!==undefined) earned[id]+=t[id]; });
    var d = DB.days[date]; if(!d) return;
    (d.indiv||[]).forEach(function(r){
      var art=SEW_OPS[r.op]; if(art) volSew[art]=(volSew[art]||0)+(r.qty||0);
    });
    (d.brigade&&d.brigade.ops||[]).forEach(function(b){
      var art=FOL_OPS[b.op];
      if(art==='Клей FP') volGlue+=(b.qty||0);
      else if(art) volFol[art]=(volFol[art]||0)+(b.qty||0);
    });
    (d.after||[]).forEach(function(r){
      var art=r.isBrigade?FOL_OPS[r.op]:SEW_OPS[r.op];
      var qty=r.qty||0;
      if(!art) return;
      if(r.isBrigade){ if(art==='Клей FP') volGlue+=qty; else volFol[art]=(volFol[art]||0)+qty; }
      else volSew[art]=(volSew[art]||0)+qty;
    });
  });

  var totSew = Object.values(volSew).reduce(function(s,v){return s+v;},0);
  var totFol = Object.values(volFol).reduce(function(s,v){return s+v;},0);

  var prods = DB.employees.filter(function(e){return e.type!=='office';});
  var offs  = DB.employees.filter(function(e){return e.type==='office';});

  var pRows=[], oRows=[];
  var pTot=0,pTax=0,pNet=0,pIns=0,pCost=0;
  var oTot=0,oTax=0,oNet=0,oIns=0,oCost=0;

  prods.forEach(function(e) {
    var g = earned[e.id]||0;
    var pr = getPrem(e.id);
    var total = g + pr.premium;
    var offB  = Math.max(0, total - pr.cash);
    var tx    = calcTax(offB);
    var cost  = offB + tx.ins + pr.cash;
    pTot+=total; pTax+=tx.tax; pNet+=tx.net; pIns+=tx.ins; pCost+=cost;
    pRows.push({e:e, g:g, pr:pr, total:total, offB:offB, tx:tx, cost:cost});
  });

  offs.forEach(function(e) {
    var g = (e.salary||0)/2;
    var pr = getPrem(e.id);
    var total = g + pr.premium;
    var offB  = Math.max(0, total - pr.cash);
    var tx    = calcTax(offB);
    var cost  = offB + tx.ins + pr.cash;
    oTot+=total; oTax+=tx.tax; oNet+=tx.net; oIns+=tx.ins; oCost+=cost;
    oRows.push({e:e, g:g, pr:pr, total:total, offB:offB, tx:tx, cost:cost});
  });

  var totCost = pCost + oCost;
  var totVol  = totSew + totFol + volGlue;
  var fsCost  = totVol>0 ? totCost*(totSew+totFol)/totVol : 0;
  var glCost  = totVol>0 ? totCost*volGlue/totVol : 0;
  var perM2   = (totSew+totFol)>0 ? fsCost/(totSew+totFol) : 0;
  var perKg   = volGlue>0 ? glCost/volGlue : 0;

  var thead = '<thead><tr><th>Сотрудник</th><th>Должность</th>' +
    '<th class="num">База</th><th class="num">Премия</th><th class="num">Начислено</th>' +
    '<th class="num" style="color:var(--amber)">Наличка</th><th class="num">Офиц.база</th>' +
    '<th class="num">НДФЛ</th><th class="num">На руки</th><th class="num">Взносы</th><th class="num">Затраты</th>' +
    '<th></th>' +
    '</tr></thead>';
  // thead для отпускных: вместо Должность — сразу Сумма отпускных
  var vacThead = '<thead><tr><th>Сотрудник 🏖</th>' +
    '<th class="num">Отпускные</th><th></th><th class="num">Начислено</th>' +
    '<th class="num" style="color:var(--amber)">Наличка</th><th class="num">Офиц.база</th>' +
    '<th class="num">НДФЛ</th><th class="num">На руки</th><th class="num">Взносы</th><th class="num">Затраты</th>' +
    '<th></th>' +
    '</tr></thead>';

  function makeRow(row) {
    var e=row.e, pr=row.pr, tx=row.tx;
    return '<tr>' +
      '<td style="font-weight:600">' + e.name + '</td>' +
      '<td style="color:var(--text3)">' + (e.pos||'—') + '</td>' +
      '<td class="num">' + fmt(row.g) + '</td>' +
      '<td><input class="ci num" style="width:70px" value="' + (pr.premium||'') + '" placeholder="0" onchange="setPrem(\'' + e.id + '\',\'' + pKey + '\',\'premium\',parseFloat(this.value)||0)"></td>' +
      '<td class="num" style="font-weight:600">' + fmt(row.total) + '</td>' +
      '<td><input class="ci num" style="width:70px;border-color:var(--amber)" value="' + (pr.cash||'') + '" placeholder="0" onchange="setPrem(\'' + e.id + '\',\'' + pKey + '\',\'cash\',parseFloat(this.value)||0)"></td>' +
      '<td class="num">' + fmt(row.offB) + '</td>' +
      '<td class="num r">' + fmt(tx.tax) + '</td>' +
      '<td class="num g">' + fmt(tx.net) + '</td>' +
      '<td class="num b">' + fmt(tx.ins) + '</td>' +
      '<td class="num" style="font-weight:700">' + fmt(row.cost) + '</td>' +
      '<td></td>' +
      '</tr>';
  }

  // Строки отпускных — для производственных и офисных
  function getVacRows(prefix) {
    var keys = Object.keys(DB.premiums).filter(function(k){ return k.indexOf(pKey+'_'+prefix+'_')===0; });
    keys.sort();
    return keys.map(function(k) {
      var vac = DB.premiums[k] || {};
      var total = vac.amount||0;
      var offB  = Math.max(0, total - (vac.cash||0));
      var tx    = calcTax(offB);
      var cost  = offB + tx.ins + (vac.cash||0);
      return {k:k, vac:vac, total:total, offB:offB, tx:tx, cost:cost};
    });
  }
  function vacRowHtml(row, allEmps) {
    var empOpts = allEmps.map(function(e){
      return '<option value="' + e.id + '"' + (e.id===row.vac.empId?' selected':'') + '>' + e.name + '</option>';
    }).join('');
    return '<tr style="background:rgba(251,191,36,.05)">' +
      '<td><select class="sel" style="width:130px" onchange="setVac(\'' + row.k + '\',\'empId\',this.value)">' +
        '<option value="">— выберите —</option>' + empOpts +
      '</select> <span style="color:var(--amber);font-size:10px">🏖</span></td>' +
      '<td class="num"><input class="ci num" style="width:80px" value="' + (row.vac.amount||'') + '" placeholder="0" onchange="setVac(\'' + row.k + '\',\'amount\',parseFloat(this.value)||0)"></td>' +
      '<td></td>' +
      '<td class="num" style="font-weight:600">' + fmt(row.total) + '</td>' +
      '<td><input class="ci num" style="width:70px;border-color:var(--amber)" value="' + (row.vac.cash||'') + '" placeholder="0" onchange="setVac(\'' + row.k + '\',\'cash\',parseFloat(this.value)||0)"></td>' +
      '<td class="num">' + fmt(row.offB) + '</td>' +
      '<td class="num r">' + fmt(row.tx.tax) + '</td>' +
      '<td class="num g">' + fmt(row.tx.net) + '</td>' +
      '<td class="num b">' + fmt(row.tx.ins) + '</td>' +
      '<td class="num" style="font-weight:700">' + fmt(row.cost) + '</td>' +
      '<td><button class="btn del sm" onclick="delVacRow(\'' + row.k + '\')">✕</button></td>' +
      '</tr>';
  }

  function makeFoot(tot,tax,net,ins,cost) {
    return '<tfoot><tr style="font-weight:700">' +
      '<td colspan="4" style="padding:5px 8px">Итого</td>' +
      '<td class="num">' + fmt(tot) + '</td><td></td><td></td>' +
      '<td class="num r">' + fmt(tax) + '</td>' +
      '<td class="num g">' + fmt(net) + '</td>' +
      '<td class="num b">' + fmt(ins) + '</td>' +
      '<td class="num">' + fmt(cost) + '</td>' +
      '<td></td>' +
      '</tr></tfoot>';
  }

  var html = '';

  // Параметры
  html += '<div class="card" style="margin-bottom:10px"><div class="card-hdr"><div class="card-title">⚙ Параметры расчёта</div></div><div class="card-body" style="display:flex;flex-wrap:wrap;gap:10px">' +
    '<div class="field" style="width:100px"><label>НДФЛ %</label><input class="inp" id="p-ndfl" value="' + (DB.settings&&DB.settings.ndfl||13) + '" type="number" onchange="DB.settings=DB.settings||{};DB.settings.ndfl=parseFloat(this.value)||13;renderPeriod()"></div>' +
    '<div class="field" style="width:110px"><label>Взносы до порога</label><input class="inp" id="p-ins1" value="30.2" type="number" onchange="renderPeriod()"></div>' +
    '<div class="field" style="width:110px"><label>Взносы сверх</label><input class="inp" id="p-ins2" value="7.6" type="number" onchange="renderPeriod()"></div>' +
    '<div class="field" style="width:130px"><label>Порог МСП, ₽</label><input class="inp" id="p-thresh" value="' + (DB.settings&&DB.settings.thresh||40639.5) + '" type="number" onchange="DB.settings=DB.settings||{};DB.settings.thresh=parseFloat(this.value)||40639.5;renderPeriod()"></div>' +
    '</div></div>';

  // KPI
  html += '<div class="kpi-row">' +
    '<div class="kcard"><div class="lbl">Начислено</div><div class="val g">' + fmt(pTot+oTot) + ' ₽</div></div>' +
    '<div class="kcard"><div class="lbl">НДФЛ</div><div class="val r">' + fmt(pTax+oTax) + ' ₽</div></div>' +
    '<div class="kcard"><div class="lbl">На руки</div><div class="val">' + fmt(pNet+oNet) + ' ₽</div></div>' +
    '<div class="kcard"><div class="lbl">Итого затрат</div><div class="val a">' + fmt(totCost) + ' ₽</div><div class="ksub">' + payLbl + '</div></div>' +
    '</div>';

  // Производство
  html += '<div class="card" style="margin-bottom:10px"><div class="card-hdr"><div class="card-title">📦 Производство за период ' + curPeriod + '</div></div><div class="card-body">';
  html += '<div style="display:flex;flex-wrap:wrap;gap:20px;margin-bottom:10px">';
  html += '<div><div class="subsec" style="margin-top:0">🔨 Прошив</div>';
  var sewE = Object.keys(volSew).filter(function(a){return volSew[a]>0;});
  sewE.forEach(function(a){ html += '<div style="font-size:11px">' + a + ': <b>' + fmtN(volSew[a]) + ' м²</b></div>'; });
  if(!sewE.length) html += '<div style="color:var(--text3);font-size:11px">—</div>';
  html += '<div style="font-size:11px;font-weight:700;margin-top:3px">Итого: ' + fmtN(totSew) + ' м²</div></div>';
  html += '<div><div class="subsec" style="margin-top:0">◈ Фольгирование</div>';
  var folE = Object.keys(volFol).filter(function(a){return volFol[a]>0;});
  folE.forEach(function(a){ html += '<div style="font-size:11px">' + a + ': <b>' + fmtN(volFol[a]) + ' м²</b></div>'; });
  if(!folE.length) html += '<div style="color:var(--text3);font-size:11px">—</div>';
  html += '<div style="font-size:11px;font-weight:700;margin-top:3px">Итого: ' + fmtN(totFol) + ' м²</div></div>';
  html += '<div><div class="subsec" style="margin-top:0">🧴 Клей FP</div><div style="font-size:18px;font-weight:700">' + fmtN(volGlue) + ' кг</div></div>';
  html += '</div>';
  if (totCost > 0) {
    html += '<div style="padding-top:10px;border-top:1px solid var(--border)"><div class="subsec" style="margin-top:0">Затраты персонала на единицу продукции</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:10px">';
    if ((totSew+totFol)>0) html += '<div style="background:var(--bg3);border-radius:var(--r);padding:8px 12px"><div style="font-size:10px;color:var(--text3)">Прошив + Фольгирование (1 м²)</div><div style="font-size:18px;font-weight:700;color:var(--amber)">' + fmt(perM2) + ' ₽</div></div>';
    if (volGlue>0) html += '<div style="background:var(--bg3);border-radius:var(--r);padding:8px 12px"><div style="font-size:10px;color:var(--text3)">Клей FP (1 кг)</div><div style="font-size:18px;font-weight:700;color:var(--amber)">' + fmt(perKg) + ' ₽</div></div>';
    html += '</div></div>';
  }
  html += '</div></div>';

  // Таблицы
  // Отпускные производственных
  var pvRows = getVacRows('pvac');
  var pvTot=0,pvTax=0,pvNet=0,pvIns=0,pvCost=0;
  pvRows.forEach(function(r){pvTot+=r.total;pvTax+=r.tx.tax;pvNet+=r.tx.net;pvIns+=r.tx.ins;pvCost+=r.cost;});

  if (prods.length) {
    html += '<div class="card" style="margin-bottom:10px"><div class="card-hdr"><div class="card-title" style="color:var(--purple)">🔨 Производственный персонал</div></div>';
    html += '<div class="tbl-wrap"><table>' + thead + '<tbody>' + (pRows.map(makeRow).join('')||'<tr><td colspan="12" style="text-align:center;color:var(--text3);padding:10px">Нет данных</td></tr>') + '</tbody>' + makeFoot(pTot,pTax,pNet,pIns,pCost) + '</table></div></div>';
    // Отпускные производственных
    html += '<div class="card" style="margin-bottom:10px;border-color:rgba(251,191,36,.3)"><div class="card-hdr" style="background:rgba(251,191,36,.05)">' +
      '<div class="card-title" style="color:var(--amber)">🏖 Отпускные — производственный персонал</div>' +
      '<div class="card-actions"><button class="btn sm" onclick="addVacRow(\'' + pKey + '\',\'pvac\')">+ Строка</button></div></div>';
    var pvacHtml = pvRows.map(function(r){return vacRowHtml(r,prods);}).join('') || '<tr><td colspan="11" style="text-align:center;color:var(--text3);padding:8px;font-size:11px">Нет отпускных</td></tr>';
    html += '<div class="tbl-wrap"><table>' + vacThead + '<tbody>' + pvacHtml + '</tbody>';
    if(pvTot>0) html += makeFoot(pvTot,pvTax,pvNet,pvIns,pvCost);
    html += '</table></div></div>';
  }

  // Отпускные офисных
  var ovRows = getVacRows('ovac');
  var ovTot=0,ovTax=0,ovNet=0,ovIns=0,ovCost=0;
  ovRows.forEach(function(r){ovTot+=r.total;ovTax+=r.tx.tax;ovNet+=r.tx.net;ovIns+=r.tx.ins;ovCost+=r.cost;});

  if (offs.length) {
    html += '<div class="card" style="margin-bottom:10px"><div class="card-hdr"><div class="card-title" style="color:var(--blue)">💼 Офисный персонал</div></div>';
    html += '<div class="tbl-wrap"><table>' + thead + '<tbody>' + oRows.map(makeRow).join('') + '</tbody>' + makeFoot(oTot,oTax,oNet,oIns,oCost) + '</table></div></div>';
    // Отпускные офисных
    html += '<div class="card" style="margin-bottom:10px;border-color:rgba(251,191,36,.3)"><div class="card-hdr" style="background:rgba(251,191,36,.05)">' +
      '<div class="card-title" style="color:var(--amber)">🏖 Отпускные — офисный персонал</div>' +
      '<div class="card-actions"><button class="btn sm" onclick="addVacRow(\'' + pKey + '\',\'ovac\')">+ Строка</button></div></div>';
    var ovacHtml = ovRows.map(function(r){return vacRowHtml(r,offs);}).join('') || '<tr><td colspan="11" style="text-align:center;color:var(--text3);padding:8px;font-size:11px">Нет отпускных</td></tr>';
    html += '<div class="tbl-wrap"><table>' + vacThead + '<tbody>' + ovacHtml + '</tbody>';
    if(ovTot>0) html += makeFoot(ovTot,ovTax,ovNet,ovIns,ovCost);
    html += '</table></div></div>';
  }

  // Комментарий к периоду
  var commentKey = 'comment_' + month + curPeriod;
  var commentVal = DB.premiums[commentKey] ? DB.premiums[commentKey].text||'' : '';
  html += '<div class="card" style="margin-top:10px"><div class="card-hdr"><div class="card-title">📝 Комментарий к периоду</div></div>' +
    '<div class="card-body"><textarea id="period-comment" style="width:100%;height:80px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--r);padding:8px;font-size:12px;font-family:inherit;resize:vertical" placeholder="Введите комментарий..." onchange="savePeriodComment(\'' + commentKey + '\',this.value)">' + commentVal + '</textarea></div></div>';

  document.getElementById('content').innerHTML = html;
}

function savePeriodComment(key, val) {
  if (!DB.premiums[key]) DB.premiums[key] = {};
  DB.premiums[key].text = val;
}

function setPrem(empId, pKey, field, val) {
  var k = pKey + '_' + empId;
  if (!DB.premiums[k]) DB.premiums[k] = {premium:0, cash:0};
  DB.premiums[k][field] = val;
  renderPeriod();
}
function setVac(k, field, val) {
  if (!DB.premiums[k]) DB.premiums[k] = {};
  DB.premiums[k][field] = val;
  renderPeriod();
}
function addVacRow(pKey, prefix) {
  var n = 0;
  while (DB.premiums[pKey+'_'+prefix+'_'+n]) n++;
  var k = pKey + '_' + prefix + '_' + n;
  DB.premiums[k] = {empId:'', amount:0, cash:0};
  renderPeriod();
}
function delVacRow(k) {
  delete DB.premiums[k];
  renderPeriod();
}

// ── СОТРУДНИКИ ──
function renderEmps() {
  var html = '<div style="margin-bottom:10px"><button class="btn g" onclick="openEmpModal(null)">+ Добавить сотрудника</button></div>';
  html += DB.employees.map(function(e) {
    return '<div class="card" style="margin-bottom:6px"><div class="card-hdr">' +
      '<span style="font-weight:600">' + e.name + '</span>' +
      '<span class="badge ' + (e.type==='office'?'b':'g') + '" style="margin-left:6px">' + (e.type==='office'?'Офис':'Произв.') + '</span>' +
      '<span style="color:var(--text3);font-size:10px;margin-left:8px">' + (e.pos||'') + '</span>' +
      (e.type==='office'?'<span style="color:var(--text3);font-size:10px;margin-left:8px">Оклад: ' + fmt(e.salary||0) + ' ₽</span>':'') +
      '<div class="card-actions">' +
      '<button class="btn sm" onclick="openEmpModal(\'' + e.id + '\')">✏</button>' +
      '<button class="btn sm del" onclick="delEmp(\'' + e.id + '\')">✕</button>' +
      '</div></div>' +
      (e.type!=='office'&&Object.keys(e.rates||{}).length?
        '<div class="card-body" style="font-size:10px;color:var(--text3)">Тарифы: ' +
        Object.keys(SEW_OPS).filter(function(k){return e.rates&&e.rates[k];}).map(function(k){return SEW_OPS[k]+': '+fmt(e.rates[k]);}).join(' · ') +
        '</div>':'') +
      '</div>';
  }).join('') || '<div style="color:var(--text3);padding:10px">Нет сотрудников</div>';

  // Тарифы бригады
  html += '<div class="card" style="margin-top:10px"><div class="card-hdr"><div class="card-title" style="color:var(--green)">◈ Тарифы бригады</div></div><div class="card-body">';
  html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px">';
  Object.keys(FOL_OPS).forEach(function(k) {
    html += '<div class="field"><label>' + FOL_OPS[k] + '</label>' +
      '<input class="inp" value="' + ((DB.brigRates[k]&&(+DB.brigRates[k]).toFixed(2))||'') + '" placeholder="0.00" type="number" step="0.01" onchange="DB.brigRates[\'' + k + '\']=parseFloat(this.value)||0"></div>';
  });
  html += '</div></div></div>';

  document.getElementById('content').innerHTML = html;
}

var modalEmpId = null;
function openEmpModal(id) {
  modalEmpId = id;
  var e = id ? DB.employees.find(function(x){return x.id===id;}) : null;
  var isOff = e && e.type==='office';
  document.getElementById('modal-title').textContent = id ? 'Редактировать сотрудника' : 'Новый сотрудник';
  var body = '<div class="fgrid" style="margin-bottom:8px">' +
    '<div class="field" style="grid-column:1/-1"><label>ФИО</label><input class="inp" id="e-name" value="' + (e?e.name:'') + '" placeholder="Иванов Иван Иванович"></div>' +
    '<div class="field"><label>Должность</label><input class="inp" id="e-pos" value="' + (e?e.pos||'':'') + '"></div>' +
    '<div class="field"><label>Тип</label><select class="sel" id="e-type" style="width:100%" onchange="onEmpTypeChange()">' +
    '<option value="prod"' + (!isOff?' selected':'') + '>Производственный</option>' +
    '<option value="office"' + (isOff?' selected':'') + '>Офисный (оклад)</option>' +
    '</select></div>' +
    '</div>' +
    '<div id="e-office-block" style="display:' + (isOff?'block':'none') + '">' +
    '<div class="field"><label>Оклад ₽/мес</label><input class="inp" id="e-salary" type="number" value="' + (e&&e.salary||0) + '"></div>' +
    '</div>' +
    '<div id="e-prod-block" style="display:' + (!isOff?'block':'none') + '">' +
    '<div class="subsec">Тарифы прошива (₽/м²)</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
  Object.keys(SEW_OPS).forEach(function(k) {
    body += '<div class="field"><label>' + SEW_OPS[k] + '</label>' +
      '<input class="inp" id="er-' + k + '" type="number" step="0.01" value="' + (e&&e.rates&&e.rates[k]?(+e.rates[k]).toFixed(2):'') + '" placeholder="0.00"></div>';
  });
  body += '</div></div>';
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal').classList.add('open');
}

function onEmpTypeChange() {
  var t = document.getElementById('e-type').value;
  document.getElementById('e-office-block').style.display = t==='office'?'block':'none';
  document.getElementById('e-prod-block').style.display   = t==='office'?'none':'block';
}

function modalSave() {
  var name = document.getElementById('e-name').value.trim();
  if (!name) { alert('Введите ФИО'); return; }
  var type   = document.getElementById('e-type').value;
  var pos    = document.getElementById('e-pos').value;
  var salary = parseFloat(document.getElementById('e-salary').value)||0;
  var rates  = {};
  if (type !== 'office') {
    Object.keys(SEW_OPS).forEach(function(k){
      var el = document.getElementById('er-'+k);
      var v  = el ? parseFloat(el.value) : 0;
      if (v > 0) rates[k] = v;
    });
  }
  var rec = {id: modalEmpId||uid(), name:name, pos:pos, type:type, salary:salary, rates:rates};
  if (modalEmpId) {
    DB.employees = DB.employees.map(function(e){return e.id===modalEmpId?rec:e;});
  } else {
    DB.employees.push(rec);
  }
  closeModal();
  renderEmps();
}

function delEmp(id) {
  if (!confirm('Удалить сотрудника?')) return;
  DB.employees = DB.employees.filter(function(e){return e.id!==id;});
  renderEmps();
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

// ── СТАРТ ──
function init() {
  var now = new Date();
  document.getElementById('sel-month').value = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  setPeriod(1);
  loadAll();
}

init();
</script>
</body>
</html>
