<!DOCTYPE html>
<html>
<head><title>TEST</title></head>
<body>
<h1 id="status">Загрузка...</h1>
<pre id="result"></pre>
<script>
const GS_URL = 'https://script.google.com/macros/s/AKfycbzC0vd34pjqKioZyiy_f7P9zTbrmmlZO6Xacw1XZSVvv1vSfsq2dJwi4vK1bhrzRZUwkQ/exec';
document.getElementById('status').textContent = 'Файл загружен: ' + new Date().toLocaleTimeString();
fetch(GS_URL + '?action=load&table=settings')
  .then(r => r.json())
  .then(d => {
    document.getElementById('result').textContent = 'Apps Script OK: ' + JSON.stringify(d).substring(0,100);
  })
  .catch(e => {
    document.getElementById('result').textContent = 'ОШИБКА: ' + e.message;
  });
</script>
</body>
</html>
